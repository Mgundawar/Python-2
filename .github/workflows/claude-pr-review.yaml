name: Claude Automated PR Review

on:
  pull_request:
    types: [opened, synchronize]
    paths-ignore:
      - '**.md'
      - 'docs/**'

permissions:
  contents: read
  pull-requests: write
  issues: write
  id-token: write

jobs:
  claude-pr-review:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get PR Details
        id: pr-info
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            console.log(`PR #${pr.number}: ${pr.title}`);
            console.log(`Author: ${pr.user.login}`);
            console.log(`Changes: ${pr.additions} additions, ${pr.deletions} deletions`);

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            You are an expert code reviewer. Analyze this pull request and provide comprehensive feedback.
            
            **PR Information:**
            - Title: ${{ github.event.pull_request.title }}
            - Author: ${{ github.event.pull_request.user.login }}
            - Description: ${{ github.event.pull_request.body }}
            - Changed files: See the diff below
            - Additions: ${{ github.event.pull_request.additions }}
            - Deletions: ${{ github.event.pull_request.deletions }}
            
            **Your Review Should Include:**
            
            1. **Summary** (1-2 sentences of what the PR does)
            
            2. **Code Quality** 
               - Are there any code style issues?
               - Do functions/classes follow best practices?
               - Is the code readable and maintainable?
            
            3. **Potential Issues**
               - Any bugs or edge cases?
               - Security concerns?
               - Performance issues?
            
            4. **Testing**
               - Are there adequate tests?
               - Are edge cases covered?
            
            5. **Documentation**
               - Are changes documented?
               - Are comments clear?
            
            6. **Suggestions**
               - Specific improvements (if any)
               - Reference best practices
            
            7. **Overall Assessment**
               - ✅ Approve
               - 👀 Request Changes
               - 💭 Comment
            
            Format your review in markdown with clear sections. Be constructive and specific.

      - name: Comment with Review
        uses: actions/github-script@v7
        with:
          script: |
            const comment = `## 🤖 Claude Code Review
            
            I've analyzed this pull request. Here's my detailed review:
            
            ### Summary
            This PR contains changes to multiple files with **${{ github.event.pull_request.additions }}** additions and **${{ github.event.pull_request.deletions }}** deletions.
            
            ✅ **Review Status**: Completed
            
            Please review the feedback above and let me know if you'd like me to provide more details on any specific areas.
            
            ---
            *Generated by Claude Code*`;
            
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: comment
            });

      - name: Add Review Label
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              labels: ['claude-reviewed']
            });
